tool: tofu
subcommand: plan
description: Strip refreshing/lock noise from OpenTofu plan; keep the change summary.
strip_ansi: true
strip_lines:
  - 'Refreshing state\.\.\.'
  - ': Reading\.\.\.'
  - ': Read complete after'
  - '^\s*$'
match_output:
  - pattern: 'No changes\. Your infrastructure matches the configuration'
    message: "tofu plan: no changes"
    unless: 'Error:'
max_lines: 80
tests:
  - name: no-changes short-circuit
    input: |
      aws_instance.web: Refreshing state... [id=i-123]
      No changes. Your infrastructure matches the configuration.
    expected: "tofu plan: no changes"
