tool: ping
description: Drop per-packet lines; keep the statistics summary.
strip_lines:
  - 'bytes from '
  - '^PING '
tests:
  - name: keeps summary only
    input: |
      PING example.com (93.184.216.34): 56 data bytes
      64 bytes from 93.184.216.34: icmp_seq=0 ttl=56 time=11.6 ms
      64 bytes from 93.184.216.34: icmp_seq=1 ttl=56 time=11.9 ms

      --- example.com ping statistics ---
      2 packets transmitted, 2 packets received, 0.0% packet loss
      round-trip min/avg/max/stddev = 11.6/11.7/11.9/0.1 ms
    expected: |

      --- example.com ping statistics ---
      2 packets transmitted, 2 packets received, 0.0% packet loss
      round-trip min/avg/max/stddev = 11.6/11.7/11.9/0.1 ms
