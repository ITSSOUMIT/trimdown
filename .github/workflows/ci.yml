name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Cross-compile (CGO_ENABLED=0)
        run: make crosscheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
