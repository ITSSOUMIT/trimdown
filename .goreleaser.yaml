version: 2

project_name: trimdown

before:
  hooks:
    - go mod tidy

builds:
  - id: trimdown
    main: ./cmd/trimdown
    binary: trimdown
    env:
      - CGO_ENABLED=0
    # Homebrew cask is macOS-only, so a brew-only release builds darwin only.
    # (Add linux/windows back when we enable other channels.)
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/itssoumit/trimdown/internal/meta.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# macOS package manager (Homebrew cask).
homebrew_casks:
  - repository:
      owner: itssoumit
      name: homebrew-tap
    homepage: https://github.com/itssoumit/trimdown
    description: CLI proxy that compresses tool output to cut LLM token use.
    # Remove the quarantine xattr so the unsigned binary runs without prompts.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/trimdown"]
          end

release:
  github:
    owner: itssoumit
    name: trimdown
  draft: false
  prerelease: auto
